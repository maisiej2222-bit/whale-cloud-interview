<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Envelope body -->
  <rect x="30" y="60" width="140" height="100" rx="8" fill="#0EA5E9" stroke="#0284C7" stroke-width="3"/>

  <!-- Envelope flap (closed) -->
  <path d="M 30 60 L 100 110 L 170 60" fill="#38BDF8" stroke="#0284C7" stroke-width="3" stroke-linejoin="round"/>

  <!-- Envelope flap triangle -->
  <path d="M 30 60 L 100 110 L 170 60 Z" fill="#0EA5E9" opacity="0.8"/>

  <!-- Letter lines inside (visible through envelope) -->
  <rect x="50" y="85" width="100" height="3" rx="1.5" fill="white" opacity="0.4"/>
  <rect x="50" y="95" width="100" height="3" rx="1.5" fill="white" opacity="0.4"/>
  <rect x="50" y="105" width="80" height="3" rx="1.5" fill="white" opacity="0.4"/>

  <!-- Small heart or whale detail (optional) -->
  <circle cx="100" cy="130" r="8" fill="#F43F5E" opacity="0.7"/>
</svg>
